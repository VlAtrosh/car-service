<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Автосервис - Система управления</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app-layout">
        <!-- Левое меню -->
        <aside class="sidebar">
            <div class="logo">
                <h2>🚗 АвтоСервис</h2>
            </div>
            <nav class="nav-menu">
                <div class="nav-item active" data-page="orders">
                    <span class="icon">📋</span>
                    <span>Заказ-наряды</span>
                </div>
                <div class="nav-item" data-page="clients">
                    <span class="icon">👥</span>
                    <span>Клиенты</span>
                </div>
                <div class="nav-item" data-page="cars">
                    <span class="icon">🚙</span>
                    <span>Автомобили</span>
                </div>
                <div class="nav-item" data-page="reference">
                    <span class="icon">📚</span>
                    <span>Справочники</span>
                </div>
                <div class="nav-item" data-page="reports">
                    <span class="icon">📊</span>
                    <span>Отчёты</span>
                </div>
                <div class="nav-item" data-page="settings">
                    <span class="icon">⚙️</span>
                    <span>Настройки</span>
                </div>
            </nav>
            <div class="user-info">
                <div class="user-avatar">👤</div>
                <div class="user-details">
                    <span id="user-name">Загрузка...</span>
                    <span id="user-role" class="user-role"></span>
                </div>
                <button id="logout-btn" class="logout-btn">🚪</button>
            </div>
        </aside>

        <!-- Основной контент -->
        <main class="main-content">
            <header class="top-bar">
                <h1 id="page-title">Заказ-наряды</h1>
                <button id="create-order-btn" class="create-btn">+ Создать заказ</button>
            </header>
            
            <div id="content-area" class="content-area">
                <div class="loading">Загрузка...</div>
            </div>
        </main>
    </div>

    <!-- Модальное окно авторизации -->
    <div id="login-modal" class="modal">
        <div class="modal-content">
            <h2>Авторизация</h2>
            <form id="login-form">
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" id="login-email" placeholder="test@mail.ru" required>
                </div>
                <div class="form-group">
                    <label>Пароль:</label>
                    <input type="password" id="login-password" placeholder="123" required>
                </div>
                <div class="form-group">
                    <label>Имя (для регистрации):</label>
                    <input type="text" id="register-name" placeholder="Иван Петров">
                </div>
                <div class="form-group">
                    <label>Телефон (для регистрации):</label>
                    <input type="text" id="register-phone" placeholder="+79123456789">
                </div>
                <div class="form-buttons">
                    <button type="submit" class="btn">Войти</button>
                    <button type="button" id="register-btn" class="btn-secondary">Зарегистрироваться</button>
                </div>
            </form>
            <div id="login-error" class="error-message"></div>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
